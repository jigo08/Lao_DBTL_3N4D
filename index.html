<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Lào – Đông Bắc Thái 4N3Đ | VietKite Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8510A;--orange2:#F4773A;--green:#1A7D3C;--green2:#2DB354;
  --dark:#111;--text:#2d2d2d;--muted:#6b7280;--bg:#fafaf8;--white:#fff;
  --gold:#F5A623;--radius:16px;--shadow:0 8px 32px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:"Be Vietnam Pro",sans-serif;color:var(--text);background:var(--bg);overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* ============================================================
   NAV
============================================================ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-bottom:1.5px solid rgba(0,0,0,.06);
  padding:0 clamp(16px,5vw,60px);
  display:flex;align-items:center;justify-content:space-between;
  height:68px;
}
.nav-logo img{height:50px;object-fit:contain;width:auto}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-weight:700;font-size:13px;color:var(--dark);letter-spacing:.3px;transition:color .2s}
.nav-links a:hover{color:var(--orange)}
.nav-cta{
  background:var(--orange);color:#fff;padding:9px 22px;
  border-radius:50px;font-weight:800;font-size:13px;
  transition:all .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(232,81,10,.3)
}
.nav-cta:hover{background:#c44108;transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--dark);border-radius:2px;transition:.3s}
.mob-menu{
  display:none;position:fixed;top:68px;inset-x:0;background:#fff;
  z-index:999;padding:20px clamp(16px,5vw,60px);
  flex-direction:column;gap:4px;box-shadow:0 12px 40px rgba(0,0,0,.1)
}
.mob-menu.open{display:flex}
.mob-menu a{
  font-weight:700;font-size:15px;padding:12px 0;color:var(--dark);
  border-bottom:1px solid #f3f4f6;transition:color .2s
}
.mob-menu a:hover{color:var(--orange)}

/* ============================================================
   HERO
============================================================ */
.hero{
  min-height:100vh;position:relative;display:flex;align-items:center;
  justify-content:center;overflow:hidden;padding-top:68px;
}
.hero-bg{
  position:absolute;inset:0;
  background:url("https://vietkite.com.vn/wp-content/uploads/2024/02/du-lich-lao-390x260.png") center/cover no-repeat;
}
.hero-bg::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(10,30,15,.82) 0%,rgba(232,81,10,.45) 100%)
}
.hero-content{
  position:relative;z-index:2;text-align:center;
  padding:60px clamp(16px,5vw,60px);max-width:860px;
  animation:fadeUp .9s ease both
}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--gold);color:#4a2800;padding:6px 18px;
  border-radius:50px;font-weight:800;font-size:12px;
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:22px
}
.hero h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(38px,7.5vw,88px);color:#fff;line-height:1.08;
  font-weight:900;margin-bottom:18px;text-shadow:0 2px 24px rgba(0,0,0,.4)
}
.hero h1 span{color:#FFD166;font-style:italic}
.hero-sub{
  font-size:clamp(15px,2.2vw,19px);color:rgba(255,255,255,.88);
  margin-bottom:36px;max-width:640px;margin-left:auto;margin-right:auto
}
.hero-stats{
  display:flex;justify-content:center;gap:clamp(20px,4vw,56px);
  margin-bottom:40px;flex-wrap:wrap
}
.hero-stat strong{display:block;font-size:clamp(28px,4.5vw,46px);font-weight:900;color:#fff;line-height:1}
.hero-stat span{font-size:12px;color:rgba(255,255,255,.72);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-p{
  background:var(--orange);color:#fff;padding:15px 36px;border-radius:50px;
  font-weight:800;font-size:15px;box-shadow:0 4px 20px rgba(232,81,10,.5);transition:all .2s
}
.btn-p:hover{background:#c44108;transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,81,10,.6)}
.btn-o{
  background:rgba(255,255,255,.12);backdrop-filter:blur(8px);color:#fff;
  padding:15px 36px;border-radius:50px;font-weight:800;font-size:15px;
  border:2px solid rgba(255,255,255,.6);transition:all .2s
}
.btn-o:hover{background:rgba(255,255,255,.22);border-color:#fff}
.hero-scroll{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.55);font-size:11px;text-align:center;letter-spacing:1px;
  animation:bounce 2.2s ease infinite
}
.hero-scroll::after{content:"↓";display:block;font-size:20px;color:rgba(255,255,255,.65)}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

/* ============================================================
   TRUST BAR
============================================================ */
.trust{background:#fff7f3;border-top:3px solid var(--orange);border-bottom:3px solid var(--orange);padding:28px clamp(16px,5vw,60px)}
.trust-inner{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:20px}
.trust-item{text-align:center}
.trust-item .big{font-size:clamp(24px,3.5vw,36px);font-weight:900;color:var(--orange)}
.trust-item small{display:block;font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ============================================================
   SECTION COMMONS
============================================================ */
section{padding:clamp(56px,8vw,100px) clamp(16px,5vw,60px)}
.sec-label{display:inline-block;color:var(--orange);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px}
.sec-title{font-family:"Playfair Display",serif;font-size:clamp(26px,4vw,46px);font-weight:700;color:var(--dark);margin-bottom:14px;line-height:1.2}
.sec-sub{font-size:16px;color:var(--muted);max-width:540px;line-height:1.75}
.sec-head{margin-bottom:48px}
.sec-head.c{text-align:center}.sec-head.c .sec-sub{margin:0 auto}

/* ============================================================
   HIGHLIGHTS
============================================================ */
.hl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}
.hl-card{
  background:var(--bg);border-radius:var(--radius);padding:28px 22px;
  border:1.5px solid rgba(0,0,0,.07);transition:transform .25s,box-shadow .25s;
  position:relative;overflow:hidden
}
.hl-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
.hl-card:nth-child(2)::before{background:var(--green)}
.hl-card:nth-child(3)::before{background:var(--gold)}
.hl-card:nth-child(4)::before{background:#7C3AED}
.hl-card:hover{transform:translateY(-6px);box-shadow:var(--shadow)}
.hl-img{
  width:100%;height:160px;object-fit:cover;border-radius:10px;
  margin-bottom:16px;transition:transform .4s
}
.hl-card:hover .hl-img{transform:scale(1.04)}
.hl-card h3{font-size:17px;font-weight:800;margin-bottom:8px;color:var(--dark)}
.hl-card p{font-size:14px;color:var(--muted);line-height:1.65}

/* ============================================================
   GALLERY
============================================================ */
.gallery{background:#fff}
.gal-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:240px 240px;
  gap:10px
}
.g1{grid-column:1/6;grid-row:1/3}
.g2{grid-column:6/10;grid-row:1/2}
.g3{grid-column:10/13;grid-row:1/2}
.g4{grid-column:6/9;grid-row:2/3}
.g5{grid-column:9/13;grid-row:2/3}
.g-item{border-radius:12px;overflow:hidden;position:relative}
.g-item img{width:100%;height:100%;object-fit:cover;transition:transform .45s}
.g-item:hover img{transform:scale(1.06)}
.g-caption{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.68));
  color:#fff;padding:20px 14px 14px;font-weight:700;font-size:13px;
  opacity:0;transition:opacity .3s
}
.g-item:hover .g-caption{opacity:1}

/* ============================================================
   ITINERARY
============================================================ */
.itin{background:var(--bg)}
.day-list{display:flex;flex-direction:column;gap:16px}
.day-card{
  display:grid;grid-template-columns:100px 1fr;
  border-radius:var(--radius);overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.08)
}
.day-num{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 10px;color:#fff;text-align:center
}
.day-card:nth-child(1) .day-num{background:var(--orange)}
.day-card:nth-child(2) .day-num{background:var(--green)}
.day-card:nth-child(3) .day-num{background:#7C3AED}
.day-card:nth-child(4) .day-num{background:var(--gold);color:#4a2800}
.day-num .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.day-num .n{font-size:40px;font-weight:900;line-height:1}
.day-body{background:#fff;padding:22px 24px}
.day-banner{
  width:100%;height:140px;object-fit:cover;border-radius:8px;
  margin-bottom:14px
}
.day-title{font-size:16px;font-weight:900;color:var(--dark);margin-bottom:4px}
.day-route{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.day-card:nth-child(1) .day-route{color:var(--orange)}
.day-card:nth-child(2) .day-route{color:var(--green)}
.day-card:nth-child(3) .day-route{color:#7C3AED}
.day-card:nth-child(4) .day-route{color:#b07800}
.meals{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.meal{background:rgba(232,81,10,.1);color:var(--orange);padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700}
.acts{list-style:none}
.acts li{padding:5px 0;font-size:14px;color:var(--text);border-bottom:1px solid #f5f5f5;display:flex;gap:7px;align-items:flex-start}
.acts li:last-child{border:none}
.acts li::before{content:"📍";font-size:12px;margin-top:1px;flex-shrink:0}

/* ============================================================
   PRICING
============================================================ */
.pricing{background:linear-gradient(135deg,#0a2e1a 0%,#1A7D3C 50%,#E8510A 100%);color:#fff}
.pricing .sec-title{color:#fff}
.pricing .sec-sub{color:rgba(255,255,255,.8)}
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;margin-bottom:32px}
.pc{
  background:rgba(255,255,255,.1);border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.2);padding:28px 22px;text-align:center;
  backdrop-filter:blur(10px);transition:transform .25s
}
.pc:hover{transform:translateY(-5px)}
.pc.feat{background:#fff;color:var(--dark);box-shadow:0 12px 40px rgba(0,0,0,.25);position:relative}
.feat-badge{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  background:var(--orange);color:#fff;font-size:11px;font-weight:800;
  padding:4px 18px;border-radius:50px;text-transform:uppercase;letter-spacing:1px
}
.pc h3{font-size:15px;font-weight:800;margin-bottom:6px;opacity:.8}
.pc .amt{font-size:clamp(26px,4vw,40px);font-weight:900;margin:10px 0 4px}
.pc.feat .amt{color:var(--orange)}
.pc .note{font-size:12px;opacity:.65;margin-bottom:18px}
.pc ul{list-style:none;text-align:left}
.pc ul li{padding:6px 0;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;gap:8px}
.pc.feat ul li{border-color:rgba(0,0,0,.07)}
.pc ul li::before{content:"✓";color:var(--green2);font-weight:900}
.pc.feat ul li::before{color:var(--orange)}
.holiday-note{
  text-align:center;background:rgba(255,255,255,.1);border-radius:12px;
  padding:16px 20px;border:1px solid rgba(255,255,255,.2)
}
.holiday-note strong{color:#FFD166;font-size:16px}

/* ============================================================
   SCHEDULE TABLE
============================================================ */
.sched{background:#fff}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--dark);color:#fff;padding:14px 16px;text-align:left;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:11px 16px;border-bottom:1px solid #f0f0f0}
tr:nth-child(even) td{background:#fafaf8}
tr:hover td{background:rgba(232,81,10,.04)}
.hol{background:rgba(232,81,10,.12);color:var(--orange);padding:2px 9px;border-radius:50px;font-size:11px;font-weight:800;margin-left:6px}

/* ============================================================
   SERVICES IN/OUT
============================================================ */
.svc{background:var(--bg)}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.svc-img{
  width:100%;height:260px;object-fit:cover;border-radius:var(--radius);
  margin-bottom:24px;box-shadow:var(--shadow)
}
.svc-block h3{font-size:19px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.svc-block ul{list-style:none}
.svc-block ul li{padding:8px 0;font-size:14px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;gap:10px;align-items:flex-start}
.inc li::before{content:"✅";font-size:13px}
.exc li::before{content:"❌";font-size:13px}
.pay-box{background:rgba(232,81,10,.06);border-left:4px solid var(--orange);padding:18px 22px;border-radius:0 12px 12px 0;margin-top:28px}
.pay-box p{font-weight:800;color:var(--orange);margin-bottom:6px}
.pay-box span{font-size:14.5px;line-height:1.75}

/* ============================================================
   BOOKING & NEW PRIVATE TOUR FORM STYLES
============================================================ */
.booking{
  background:url("https://vietkite.com.vn/wp-content/uploads/2024/12/tour-du-lich-lao-tu-tphcm.jpg") center/cover no-repeat;
  position:relative
}
.booking::before{content:"";position:absolute;inset:0;background:rgba(10,46,26,.88)}
.booking>*{position:relative;z-index:1}
.booking .sec-title{color:#fff}
.booking .sec-sub{color:rgba(255,255,255,.8)}
.bk-form{
  background:#fff;border-radius:20px;padding:clamp(24px,4vw,44px);
  box-shadow:0 16px 60px rgba(0,0,0,.25);max-width:680px;margin:0 auto
}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.fi{display:flex;flex-direction:column;gap:6px}
.fi.full{grid-column:span 2}
label{font-size:12px;font-weight:800;color:var(--dark);text-transform:uppercase;letter-spacing:.6px}
input,select,textarea{
  padding:11px 15px;border:2px solid #e5e7eb;border-radius:10px;
  font-size:14.5px;font-family:"Be Vietnam Pro",sans-serif;outline:none;
  background:#fafaf8;transition:border-color .2s
}
input:focus,select:focus,textarea:focus{border-color:var(--orange);background:#fff}
.submit{
  width:100%;background:var(--orange);color:#fff;padding:15px;border-radius:50px;
  font-size:16px;font-weight:800;border:none;cursor:pointer;
  font-family:"Be Vietnam Pro",sans-serif;transition:all .2s
}
.submit:hover{background:#c44108;transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,81,10,.4)}
.hotline-note{text-align:center;margin-top:12px;font-size:13px;color:var(--muted)}
.hotline-note a{color:var(--orange);font-weight:800}

/* CSS bổ sung thiết kế chuẩn theo hình ảnh mẫu */
.bk-form-custom-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--green);
  letter-spacing: 0.5px;
  margin: 24px 0 14px;
  text-transform: uppercase;
}
.bk-form-custom-title:first-of-type {
  margin-top: 0;
}
.interest-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 22px;
}
.interest-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  border: 1.5px solid #e5e7eb;
  transition: all 0.2s;
  user-select: none;
}
.interest-tag input {
  margin: 0;
  width: 15px;
  height: 15px;
  accent-color: var(--green);
  cursor: pointer;
}
.interest-tag:hover {
  background: #fdfdfd;
  border-color: #cbd5e1;
}
.interest-tag input:checked + span {
  color: var(--green);
}
.interest-tag:has(input:checked) {
  background: rgba(26, 125, 60, 0.06);
  border-color: var(--green);
}
.submit-custom-btn {
  width: 100%;
  background: var(--green);
  color: #fff;
  padding: 15px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 800;
  border: none;
  cursor: pointer;
  font-family: "Be Vietnam Pro",sans-serif;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(26,125,60,0.2);
}
.submit-custom-btn:hover {
  background: #135d2c;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(26,125,60,0.3);
}

/* ============================================================
   TESTIMONIALS
============================================================ */
.reviews{background:#fff}
.rev-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.rev-card{
  background:var(--bg);border-radius:var(--radius);padding:24px;
  border:1.5px solid rgba(0,0,0,.07)
}
.rev-stars{color:var(--gold);font-size:16px;margin-bottom:12px}
.rev-text{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:16px;font-style:italic}
.rev-author{display:flex;align-items:center;gap:12px}
.rev-avatar{
  width:44px;height:44px;border-radius:50%;object-fit:cover;
  border:2px solid var(--orange)
}
.rev-name{font-weight:800;font-size:14px}
.rev-loc{font-size:12px;color:var(--muted)}

/* ============================================================
   FOOTER
============================================================ */
footer{background:#0d1f13;color:rgba(255,255,255,.75);padding:56px clamp(16px,5vw,60px) 28px}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:40px;margin-bottom:40px}
.ft-brand img{height:52px;margin-bottom:14px;background:#fff;padding:4px 12
